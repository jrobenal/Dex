# User Profile Configuration
#
# This file stores your identity and preferences for personalized AI interactions.

# Demo Mode
# When true, commands read from System/Demo/ instead of real vault
# Toggle with /demo on or /demo off
demo_mode: false

# Your name (used to identify you in meetings, filter yourself from participant lists)
name: ""

# Your role (used in meeting analysis prompts)
role: ""

# Role group (for command filtering and adaptation)
# Options: product, sales, marketing, finance, engineering, customer_success, operations, leadership, design, support, advisory
# Default for this Kiro/Sales fork: sales
role_group: "sales"

# Your company (optional, adds context to meeting analysis)
company: ""

# Company size tier
company_size: ""  # options: startup (1-100), scaling (100-1000), enterprise (1000-10000), large_enterprise (10000+)

# Your company email domain (used to identify internal vs external people)
# Example: "pendo.io" (without @)
# Multiple domains: "pendo.io, pendo.com"
email_domain: ""

# Communication Preferences
# How the AI adapts its tone and language when working with you
communication:
  # Formality level
  formality: "professional_casual"  # options: formal, professional_casual, casual
  
  # Directness preference
  directness: "balanced"  # options: very_direct, balanced, supportive
  
  # Detail level in responses
  detail_level: "concise"  # options: concise, balanced, comprehensive
  
  # Career/seniority context (for tone calibration)
  career_level: "mid"  # options: junior, mid, senior, leadership, c_suite
  
  # Coaching style preference (for career coaching)
  coaching_style: "collaborative"  # options: encouraging, collaborative, challenging

# Meeting Processing Configuration
# How Dex processes meetings from Granola
meeting_processing:
  # Mode: "automatic" (notes appear in your vault within 30min) or "manual" (run /process-meetings)
  mode: automatic
  
  # API provider for automatic mode: gemini, anthropic, or openai
  api_provider: gemini

# Meeting Intelligence Configuration
# Controls what gets extracted from your meetings
# Sales defaults: customer intel, competitive intel, BANT, and stakeholder dynamics are ON
meeting_intelligence:
  # Extract customer pain points and challenges (SALES: always on)
  extract_customer_intel: true

  # Extract competitive mentions and comparisons (SALES: always on)
  extract_competitive_intel: true

  # Extract action items (always recommended)
  extract_action_items: true

  # Extract decisions made (always recommended)
  extract_decisions: true

  # Extract stakeholder dynamics and relationships (SALES: always on)
  extract_stakeholder_dynamics: true

  # Extract budget, authority, need, timeline (BANT for sales — always on)
  extract_budget_timeline: true

  # Extract technical decisions and architecture choices (SALES: off by default)
  extract_technical_decisions: false

  # Sales-specific extractions
  extract_objections: true          # Capture objections raised and how handled
  extract_next_steps: true          # Flag missing next steps on customer meetings
  extract_deal_signals: true        # Positive/negative deal momentum signals
  extract_forecast_changes: true    # Any commit/best-case/pipeline category changes

# Journaling Configuration
# Controls which journal types are enabled
journaling:
  # Morning journal: intention-setting for the day
  morning: false
  
  # Evening journal: reflection on the day
  evening: false
  
  # Weekly journal: patterns and synthesis
  weekly: false

# Quarterly Planning Configuration
# Sales teams always run on quarters — enabled by default in this fork
quarterly_planning:
  # Whether quarterly planning is enabled (SALES: always enabled)
  enabled: true
  
  # Has user been asked about quarterly planning during onboarding?
  prompted: false
  
  # Month when Q1 starts (1=Jan, 2=Feb, 4=Apr, etc)
  # Common: 1 (calendar year), 2 (some fiscal years), 4 (many fiscal years)
  q1_start_month: 1
  
  # Current quarter (auto-calculated by system)
  current_quarter: "Q1 2026"
  
  # Current quarter dates (auto-calculated)
  quarter_start_date: "2026-01-01"
  quarter_end_date: "2026-03-31"

# Sales Configuration (specific to this Amazon Kiro / Sales fork)
sales:
  # Sales role level: ic, manager, or leader
  # ic = individual contributor (quota-carrying AE, AM, SE, SDR)
  # manager = frontline sales manager (manages a team of reps)
  # leader = sales director, VP, CRO, or GM
  role_level: ""  # Set during onboarding

  # Annual quota (for quota attainment tracking)
  annual_quota: ""  # Example: "1200000" (in dollars, no commas)

  # Quota currency
  quota_currency: "USD"

  # CRM system in use (for context in meeting processing)
  # Options: salesforce, hubspot, dynamics, pipedrive, other, none
  crm: ""

  # Market segment (for tone and context in planning/reviews)
  # Options: smb, mid_market, enterprise, strategic, channel, public_sector
  segment: ""

  # Deal motion
  # Options: land_and_expand, transactional, solution, consultative, channel
  deal_motion: ""

  # Primary metric tracked for forecast
  # Options: arr, mrr, tcv, acv, revenue
  forecast_metric: "arr"

  # Average sales cycle length (days) — used for deal risk detection
  avg_sales_cycle_days: 90

  # Days without activity before a deal is flagged as at-risk
  deal_stale_days: 14

# IDE Configuration
ide:
  # Primary IDE for this vault
  name: "Amazon Kiro"
  url: "https://kiro.dev"
