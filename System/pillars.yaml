# Strategic Pillars Configuration — Sales Edition
#
# Pillars are your main focus areas for your sales role. They represent the ongoing
# responsibilities that define how you spend your time and create value.
#
# These are NOT time-bound goals (those go in Quarter_Goals.md).
# A pillar stays consistent for 6-12+ months. Your quota changes; your pillars don't.
#
# PILLAR (ongoing):               GOAL (time-bound):
# "Pipeline Development"    vs    "Source $2M in new pipeline in Q2"
# "Deal Execution"          vs    "Close Acme Corp by March 31"
# "Team & Coaching"         vs    "Ramp two new reps to full productivity"
#
# Pillars are pre-configured for sales teams. Edit the keywords to match your
# specific language, motion, and market segment.
#
# Want to reconfigure? Just chat: "I need to update my strategic pillars"

pillars:
