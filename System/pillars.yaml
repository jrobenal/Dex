# Priority limits (how many active tasks per priority level)
# Sales context: P0 = must happen today (deal-critical), P1 = this week, P2 = backlog
priority_limits:
  P0: 3   # Critical/urgent deal actions or manager escalations — max 3 at a time
  P1: 5   # Important weekly priorities (call prep, proposals, coaching sessions)
  P2: 10  # Backlog (admin, research, internal projects)
